<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baconz - Portfolio</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: linear-gradient(-45deg, #111, #1a1a1a, #111, #222);
        background-size: 400% 400%;
        animation: bgShift 20s ease infinite;
        color: #FFD700;
        overflow-x: hidden;
    }

    @keyframes bgShift {
        0% {background-position:0% 50%;}
        50% {background-position:100% 50%;}
        100% {background-position:0% 50%;}
    }

    .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,215,0,0.15);
        animation: floatParticle 12s infinite;
    }

    @keyframes floatParticle {
        0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 1; }
        50% { transform: translateY(-400px) translateX(100px) scale(1.3); opacity: 0.2; }
        100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 1; }
    }

    .glass {
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,215,0,0.2);
        border-radius: 1.5rem;
        padding: 2rem;
        margin-bottom: 2rem;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass:hover {
        transform: scale(1.03);
        box-shadow: 0 0 40px rgba(255,215,0,0.4);
    }

    h1, h2 {
        text-shadow: 0 0 10px rgba(255,215,0,0.4);
    }

    a {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    a:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(255,215,0,0.5);
    }
</style>
</head>
<body class="relative flex flex-col items-center justify-center min-h-screen px-4">

<script>
for(let i=0;i<25;i++){
    let p = document.createElement('div');
    p.className = 'particle';
    let size = Math.random()*10+5;
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = Math.random()*100+'%';
    p.style.top = Math.random()*100+'%';
    p.style.animationDuration = (Math.random()*8+8)+'s';
    p.style.animationDelay = Math.random()*5+'s';
    document.body.appendChild(p);
}
</script>

<div class="text-center max-w-4xl z-10">

    <p class="text-yellow-200/70 text-lg md:text-xl mb-12">
        Crafting sleek digital experiences with style and precision.
    </p>

    <div class="glass max-w-xl mx-auto mb-8 text-center">

        <p class="mb-2">Supporters: <span class="font-bold">6M+</span></p>
        <p class="text-green-300 font-semibold">✓ Joins Are On For Followers!</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-3xl mx-auto">
        <a href="https://guns.lol/bacon03" target="_blank" class="glass text-center p-6">
            🔫<br>
            guns.lol<br>
            <span class="text-yellow-300 text-sm">bacon03</span>
        </a>
        <a href="https://www.tiktok.com/@poisonedtilldeath_" target="_blank" class="glass text-center p-6">
            🎵<br>
            TikTok<br>
            <span class="text-yellow-300 text-sm">@poisonedtilldeath_</span>
        </a>
        <a href="https://www.roblox.com/users/4736443820/profile" target="_blank" class="glass text-center p-6">
            🕹️<br>
            Roblox<br>
            <span class="text-yellow-300 text-sm">PoisonedTillDeath</span>
        </a>
    </div>

    <div class="mt-12 text-yellow-200/60 text-sm">© 2026 Baconz. All rights reserved.</div>
</div>

</body>
</html>
